name: Weekly Skincare Intelligence Brief

on:
  schedule:
    # 10:00 AM IST = 04:30 AM UTC. Runs every Monday.
    - cron: '30 4 * * 1'
  workflow_dispatch:
    # Allows you to trigger this manually from the GitHub UI (for testing)

jobs:
  skincare-intel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r agents/skincare-intel/requirements.txt

      - name: Run Skincare Intelligence Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python agents/skincare-intel/main.py
