name: Skincare Intel Digest

on:
  schedule:
    - cron: '30 3 * * 1'  # Monday 9:00am IST
  workflow_dispatch:      # Allows manual test runs from GitHub UI

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      models: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openai

      - name: Run digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python skincare_intel.py
